# Minimal Nginx reverse proxy example (sample)
events { worker_connections 1024; }
http {
  server_tokens off;

  server {
    listen 80;
    server_name _;

    location / {
      proxy_pass http://127.0.0.1:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
    }
  }
}
